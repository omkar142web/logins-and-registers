<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 // Signal Lost</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* --bg: #050505; */
        --bg: #020617;
        --line: #1e293b;
        --primary: #22d3ee;
        --error: #f59e0b;
        --text: #f1f5f9;
        --terminal-bg: rgba(15, 23, 42, 0.9);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "Space Grotesk", sans-serif;
        /* Use 100dvh for modern mobile browsers to account for address bars */
        height: 100dvh;
        width: 100vw;
        overflow: hidden; /* This is the primary lock */
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        /* Add touch-action to prevent pull-to-refresh and accidental pans */
        touch-action: none;
      }

      .grid-floor {
        position: absolute;
        /* Change width to 100% and use a large scale instead to avoid edge clipping */
        width: 100%;
        height: 100%;
        bottom: 0;
        left: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 60px 60px;
        /* Perspective and rotation combined */
        transform: perspective(1000px) rotateX(65deg) scale(2);
        transform-origin: bottom;
        z-index: -1;
        opacity: 0.4;
        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 20%,
          black 80%,
          transparent
        );
        /* Ensure the grid doesn't intercept taps intended for buttons */
        pointer-events: none;
      }

      /* 2. The Main Terminal Card */
      .terminal {
        background: var(--terminal-bg);
        border: 1px solid rgba(34, 211, 238, 0.3);
        backdrop-filter: blur(12px);
        padding: 3.5rem;
        position: relative;
        max-width: 550px;
        width: 90%;
        text-align: center;
        box-shadow:
          0 0 60px rgba(0, 0, 0, 0.5),
          0 0 20px rgba(34, 211, 238, 0.05);
        clip-path: polygon(0 0, 100% 0, 100% 88%, 92% 100%, 0 100%);
      }

      .terminal::before {
        border-bottom: 1px solid rgba(34, 211, 238, 0.3);
        border-right: 1px solid rgba(34, 211, 238, 0.3);
        content: "[ SYSTEM_FAILURE ]";
        position: absolute;
        top: -1px;
        left: -1px;
        background: var(--bg);
        padding: 5px 12px;
        color: var(--primary);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        letter-spacing: 3px;
        font-weight: bold;
        border: 1px solid rgba(34, 211, 238, 0.3);
      }

      /* 3. Glitch Effect */
      .glitch-wrapper {
        margin-bottom: 1.5rem;
      }

      .glitch {
        font-size: 6rem;
        font-weight: 700;
        text-transform: uppercase;
        position: relative;
        display: inline-block;
        color: var(--text);
        letter-spacing: -2px;
      }

      .glitch::before,
      .glitch::after {
        content: "404";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      .glitch::before {
        color: var(--primary);
        z-index: -1;
        animation: glitch-anim 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both
          infinite;
        text-shadow: 0 0 10px var(--primary);
      }

      .glitch::after {
        color: var(--error);
        z-index: -2;
        animation: glitch-anim 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse
          both infinite;
        opacity: 0.6;
      }

      /* CRITICAL FIX: The Glitch Animation */
      @keyframes glitch-anim {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-4px, 2px);
        }
        40% {
          transform: translate(-4px, -2px);
        }
        60% {
          transform: translate(4px, 2px);
        }
        80% {
          transform: translate(4px, -2px);
        }
        100% {
          transform: translate(0);
        }
      }

      /* 4. Content Styles */
      h2 {
        font-family: "JetBrains Mono", monospace;
        font-size: 1rem;
        margin-bottom: 1rem;
        color: var(--primary);
        letter-spacing: 2px;
      }

      p {
        font-size: 1rem;
        color: #94a3b8;
        margin-bottom: 2.5rem;
        line-height: 1.6;
      }

      .error-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        color: var(--error);
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245, 158, 11, 0.3);
        padding: 6px 14px;
        display: inline-block;
        margin-top: 30px;

        /* Deep magenta glow */
        color: #ff75a0;
        background: rgba(233, 30, 99, 0.15);
        border: 1px solid #ff2e7e;
        text-shadow: 0 0 8px rgba(255, 46, 126, 0.5);
        box-shadow: 0 0 15px rgba(233, 30, 99, 0.1);
      }

      /* 5. Buttons */
      .btn-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      button {
        background: rgba(34, 211, 238, 0.05);
        border: 1px solid var(--primary);
        color: var(--primary);
        padding: 16px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s all;
        text-transform: uppercase;
      }

      button:hover {
        /* background: hsla(188, 86%, 53%, 0.9); */
        background: #12dfff;
        color: var(--bg);
        box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
      }

      button.secondary {
        border-color: #334155;
        color: #94a3b8;
      }

      button.secondary:hover {
        border-color: var(--text);
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
      }

      /* Scanline Effect */
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to bottom,
          transparent 50%,
          rgba(0, 0, 0, 0.1) 50%
        );
        background-size: 100% 4px;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="grid-floor"></div>
    <div class="scanline"></div>

    <div class="terminal">
      <div class="glitch-wrapper">
        <span class="glitch">404</span>
      </div>

      <h2>FILE_READ_ERROR // 0x44</h2>
      <p>
        Our servers are being a bit moody 😙. We couldn't load the page. Please
        try again.
      </p>

      <div class="btn-group">
        <button onclick="window.location.reload()">Reboot</button>
        <button class="secondary" onclick="window.location.href = '/'">
          Abort
        </button>
      </div>

      <div class="error-tag">STATUS: DISCONNECTED // SECTOR_LOST</div>
    </div>
  </body>
</html>
